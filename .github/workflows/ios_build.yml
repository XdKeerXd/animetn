name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get

      - name: Setup env File
        env:
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        shell: bash
        run: |
          echo "SIMKL_CLIENT_SECRET=$SIMKL_CLIENT_SECRET" > .env
          echo "SIMKL_CLIENT_ID=$SIMKL_CLIENT_ID" >> .env

      - name: Build iOS
        run: flutter build ios --release --no-codesign --dart-define-from-file=.env
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -vr animetn.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: animetn-ios-ipa
          path: animetn.ipa
